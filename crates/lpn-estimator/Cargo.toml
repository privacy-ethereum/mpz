[package]
name = "lpn-estimator"
version = "0.1.0"
edition = "2021"

[dependencies]
opaque-debug = "0.3"
bcs = "0.1"
rand_core = "0.9"
rug = "1.27"
bytemuck = { version = "1.21", features = ["derive"] }
generic-array = "1.2"
cfg-if = "1.0"
rayon = "1.10"

[dev-dependencies]
divan = "0.1"

[[bin]]
name = "exact"
path = "src/bin/exact.rs"

[[bin]]
name = "regular"
path = "src/bin/regular.rs"

[[bin]]
name = "estimator"
path = "src/bin/estimator.rs"

[[bin]]
name = "lpn_table_checker"
path = "src/bin/lpn_table_checker.rs"

[[bench]]
name = "throughput"
harness = false
