[package]
name = "mpz-vm-zk"
version = "0.1.0"
edition = "2024"

[dependencies]
mpz-zk-core-new = { workspace = true, features = ["rayon"] }
mpz-circuits-new = { workspace = true }
mpz-vm-memory = { workspace = true }
mpz-vm-circuits = { workspace = true }

mpz-core = { workspace = true }
mpz-common = { workspace = true }
mpz-fields = { workspace = true }
mpz-vm-ir = { workspace = true }
mpz-ot-core = { workspace = true, features = ["rayon"] }
mpz-vm-core-new = { workspace = true }

itybity = { workspace = true }
blake3 = { workspace = true }
rand = { workspace = true }
rangeset = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serio = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
zerocopy = { workspace = true, features = ["derive"] }

[dev-dependencies]
mpz-common = { workspace = true, features = ["test-utils"] }
