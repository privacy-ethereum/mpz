[package]
name = "mpz-vm-zk"
version = "0.1.0"
edition = "2024"

[dependencies]
mpz-zk-core = { workspace = true, features = ["rayon"] }
mpz-circuits = { workspace = true }
mpz-vm-memory = { workspace = true }
mpz-vm-circuits = { workspace = true }

mpz-core = { workspace = true }
mpz-common = { workspace = true }
mpz-fields = { workspace = true }
mpz-vm-ir = { workspace = true }
mpz-ot-core = { workspace = true, features = ["rayon"] }
mpz-vm-core = { workspace = true }

itybity = { workspace = true }
blake3 = { workspace = true }
rand = { workspace = true }
rand_chacha = { workspace = true }
# Unconditional: the segmented prover/verifier always parallelize across
# segments, unlike zk-core where rayon is an optional acceleration.
rayon = { workspace = true }
rangeset = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serio = { workspace = true }
# `compress` exposes `compress256`: the clear-text SHA-256 compression used to
# write the precompile's result during capture.
sha2 = { workspace = true, features = ["compress"] }
thiserror = { workspace = true }
tracing = { workspace = true }
zerocopy = { workspace = true, features = ["derive"] }

[dev-dependencies]
mpz-common = { workspace = true, features = ["test-utils"] }
mpz-ot = { workspace = true, features = ["ideal", "rayon"] }
mpz-vm-test-harness = { workspace = true }
criterion = { workspace = true }
futures = { workspace = true }
rand = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }
wat = { workspace = true }

[[bench]]
name = "vm"
harness = false

[lints]
workspace = true
