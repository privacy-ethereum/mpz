<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>mpz-garble-core WASM Benchmarks</title>
    <style>
        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #569cd6;
        }
        #status {
            color: #4ec9b0;
            margin-bottom: 10px;
        }
        #output {
            white-space: pre;
            background: #252526;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .error {
            color: #f44747;
        }
        .success {
            color: #4ec9b0;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
            font-family: monospace;
        }
        button:hover {
            background: #1177bb;
        }
        button:disabled {
            background: #3c3c3c;
            cursor: not-allowed;
        }
        #controls {
            margin-bottom: 15px;
        }
        label {
            margin-right: 15px;
        }
        input[type="number"] {
            width: 60px;
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 4px;
        }
    </style>
</head>
<body>
    <h1>mpz WASM Benchmarks</h1>

    <div id="controls">
        <label>Iterations: <input type="number" id="iterations" value="100" min="1"></label>
        <label>Samples: <input type="number" id="samples" value="10" min="1"></label>
        <br><br>
        <button id="runAll" disabled>Run All Benchmarks</button>
        <button id="runGarbleCore" disabled>garble-core Only</button>
    </div>

    <div id="status">Loading WASM module...</div>
    <div id="output"></div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
