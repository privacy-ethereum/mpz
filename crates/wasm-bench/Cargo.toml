[package]
name = "mpz-wasm-bench"
version = "0.1.0-alpha.5"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
mpz-garble-core = { workspace = true }
mpz-garble = { workspace = true }
mpz-zk-core = { workspace = true, features = ["rayon"] }
mpz-zk = { workspace = true, features = ["rayon"] }
pollster = { workspace = true }
mpz-circuits = { workspace = true, features = ["aes"] }
mpz-memory-core = { workspace = true }
mpz-core = { workspace = true }
mpz-common = { workspace = true, features = ["test-utils"] }
mpz-ot = { workspace = true, features = ["ideal", "rayon"] }
mpz-ot-core = { workspace = true, features = ["rayon"] }
mpz-vm-core = { workspace = true }
blake3 = { workspace = true }

wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
getrandom = { version = "0.3", features = ["wasm_js"] }
rand = { workspace = true }
futures = { workspace = true }
web-spawn = { version = "0.2", features = ["no-bundler"] }
rayon = { workspace = true }
web-sys = { version = "0.3", features = ["console", "Window", "Performance"] }
serio = { workspace = true }
aes-wasm = "0.1"
aes = { workspace = true }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
chromiumoxide = { version = "0.7", features = ["tokio-runtime"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "process", "net", "io-util"] }
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0"
futures = { workspace = true }
hyper = { version = "1.8", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"
mime_guess = "2.0"

[[bin]]
name = "wasm-bench-runner"
path = "src/bin/runner.rs"
required-features = []
