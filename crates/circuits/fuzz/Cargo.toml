[package]
name = "mpz-circuits-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
itybity = "0.3"
sha2 = { version = "0.10", features = ["compress"] }
mpz-circuits = { path = ".." }
mpz-fields = { path = "../../fields" }

[[bin]]
name = "sha256_compress"
path = "fuzz_targets/sha256_compress.rs"
test = false
doc = false
bench = false

[workspace]
